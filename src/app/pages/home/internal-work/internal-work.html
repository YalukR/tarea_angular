<!-- Overlay -->
<div class="fixed inset-0 bg-black/40 z-[199] transition-opacity duration-400" [class.opacity-0]="!isOpen()"
    [class.pointer-events-none]="!isOpen()" (click)="close()">
</div>

<!-- Drawer -->
<div class="drawer fixed top-0 right-0 h-screen w-full bg-[#111] text-white z-[200] flex flex-col px-10 py-5 overflow-hidden"
    [class.open]="isOpen()">

    <!-- Header -->
    <div class="flex justify-between items-start pb-4 mb-6 border-b border-white/15">
        <div class="flex items-start gap-4">
            <span class="text-[10px] opacity-50 mt-0.5">●</span>
            <div>
                <p class="font-mono text-[11px] tracking-wide opacity-70">({{ items.length }}) INTERNAL WORKS</p>
                <p class="font-mono text-[11px] tracking-wide opacity-70">©26 c/o BASIC/DEPT®</p>
            </div>
            <p class="font-mono text-[11px] tracking-wide opacity-50 max-w-sm ml-10">
                A COLLECTION OF INTERNAL PROJECT AND INITIATIVES UNDER THE BASIC/DEPT® BRAND.
            </p>
        </div>
        <button (click)="close()"
            class="border border-white/30 rounded-full w-9 h-9 flex items-center justify-center text-sm cursor-pointer hover:bg-white/10 transition-colors">
            ✕
        </button>
    </div>

    <!-- Cards -->
    <div class="flex gap-0.5 flex-1 overflow-hidden">
        @for (item of items; track item.id; let i = $index) {
        <div class="card flex-1 flex flex-col overflow-hidden cursor-pointer"
            [style.transition-delay]="isOpen() ? (i * 60) + 'ms' : '0ms'">
            <div class="flex-1 overflow-hidden">
                <img [src]="item.image" [alt]="item.title"
                    class="w-full h-full object-cover transition-transform duration-500 hover:scale-[1.04]" />
            </div>
            <div class="pt-3 pb-2">
                <div class="flex justify-between items-baseline mb-1">
                    <h3 class="font-black text-sm tracking-wide">{{ item.title }}</h3>
                    <span class="font-mono text-[11px] opacity-50">{{ item.year }}</span>
                </div>
                <p class="font-mono text-[10px] tracking-widest uppercase opacity-50">{{ item.category }}</p>
            </div>
            <div class="font-mono text-[10px] opacity-30 pb-1">0{{ i + 1 }}</div>
        </div>
        }
    </div>

    <!-- Footer -->
    <div class="flex justify-between pt-3 border-t border-white/10 opacity-40">
        <span class="font-mono text-xs">01</span>
        <span class="font-mono text-xs">/0{{ items.length }}</span>
    </div>

</div>
