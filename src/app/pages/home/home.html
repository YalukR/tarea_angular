<div #section data-theme="#ffffff">
    <app-video-player></app-video-player>
</div>

<section #section data-theme="#000000" class="grid grid-cols-3 min-h-screen px-20 bg-[#eeede9] items-center">
    <div class="group flex flex-col items-center gap-8 px-10 text-center cursor-pointer">
        <img src="images/adAge.png" alt="AdAge"
            class="h-24 object-contain brightness-0 transition-transform duration-300 group-hover:scale-110" />
        <p class="font-mono text-[10px] tracking-widest uppercase leading-relaxed group-hover:underline">Design and
            Branding Agency of the Year</p>
    </div>
    <div class="group flex flex-col items-center gap-8 px-10 text-center cursor-pointer">
        <img src="images/theWebbyAwards.png" alt="The Webby Awards"
            class="h-24 object-contain brightness-0 transition-transform duration-300 group-hover:scale-110" />
        <p class="font-mono text-[10px] tracking-widest uppercase leading-relaxed group-hover:underline">Agency of the
            Year</p>
    </div>
    <div class="group flex flex-col items-center gap-8 px-10 text-center cursor-pointer">
        <img src="images/campaignUs.png" alt="Campaign US"
            class="h-24 object-contain brightness-0 transition-transform duration-300 group-hover:scale-110" />
        <p class="font-mono text-[10px] tracking-widest uppercase leading-relaxed group-hover:underline">Digital
            Innovation Agency of the Year Finalist</p>
    </div>
</section>

<!-- Divider -->
<div class="h-px bg-black" style="width: 100vw; margin-left: calc(50% - 50vw)"></div>

<!-- About section -->
<section #section data-theme="#000000" class="grid grid-cols-2 min-h-screen px-20 bg-[#eeede9] items-center gap-20">

  <!-- Left: texto + botón -->
  <div class="flex flex-col gap-8">
    <p class="text-2xl font-bold leading-snug">
      BASIC/DEPT® is a global branding and digital design agency building products, services, and eCommerce experiences that turn cultural values into company value.
    </p>
    <button
      class="btn-fill self-start rounded-full px-5 py-2 text-[10px] tracking-widest uppercase font-mono"
      style="--btn-color: #000; --btn-hover-color: #fff">
      See the work
    </button>
  </div>

  <!-- Right: B/D® gigante -->
  <div class="flex items-center justify-center">
    <span class="font-black leading-none select-none" style="font-size: clamp(80px, 12vw, 160px)">
      B/D®
    </span>
  </div>

</section>
