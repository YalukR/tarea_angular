<section class="bg-[#eeede9] px-20 py-16">

    <div class="flex justify-between items-start mb-12">
        <h2 class="font-black text-5xl leading-tight">FEATURED<br>NEWS</h2>
        <button class="btn-fill self-start font-mono text-[10px] tracking-widest uppercase px-5 py-2 rounded-full mt-2"
            style="--btn-color: #000; --btn-hover-color: #fff">
            VIEW ALL
        </button>
    </div>

    @for (item of items; track $index) {
    <div class="group border-t border-black/20 py-10 flex gap-12 items-center cursor-pointer">
        <div class="overflow-hidden flex-shrink-0 w-[35vw]">
            <img [src]="item.image" [alt]="item.alt"
                class="w-full aspect-[4/3] object-cover transition-transform duration-700 group-hover:scale-105" />
        </div>
        <div class="flex-1">
            <h3 class="font-black text-4xl leading-snug tracking-tight max-w-2xl group-underline">{{ item.title }}</h3>
            <p class="font-mono text-[10px] tracking-widest uppercase mt-6 text-black/50">
                {{ item.category }} {{ item.date }}
            </p>
        </div>
        <span class="text-2xl flex-shrink-0 transition-transform duration-300 group-hover:translate-x-2">→</span>
    </div>
    }

    <div class="border-b border-black/20"></div>

</section>
