<section class="bg-[#f5f5f3] px-20 py-16">
    <div class="flex justify-between items-start mb-12">
        <h2 class="font-black text-5xl leading-tight">FEATURED<br>NEWS</h2>
        <button class="btn-fill self-start font-mono text-[10px] tracking-widest uppercase px-5 py-2 rounded-full mt-2"
            style="--btn-color: #000; --btn-hover-color: #fff">
            VIEW ALL
        </button>
    </div>

    @for (item of items; track $index) {
    <div class="group border-t border-black/20 py-8 flex gap-8 cursor-pointer">

        <div class="overflow-hidden flex-shrink-0 w-[26.4vw]">
            <img [src]="item.image" [alt]="item.alt"
                class="w-full aspect-[4/3] object-cover transition-transform duration-700 group-hover:scale-105" />
        </div>

        <div class="flex-1 flex flex-col justify-between py-2">
            <h3 class="font-black text-[1.7rem] leading-snug tracking-tight max-w-xl underline-fill">{{ item.title }}
            </h3>
            <p class="font-mono text-[12px] tracking-widest uppercase text-black/50"> 
                {{ item.category }} {{ item.date }}
            </p>
        </div>

        <span class="text-xl flex-shrink-0 pt-2 transition-transform duration-300 group-hover:translate-x-2">→</span>

    </div>
    }

    <div class="border-b border-black/20"></div>
</section>
